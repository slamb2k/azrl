version: 2

project_name: azrl

before:
  hooks:
    - go mod tidy

builds:
  - id: azrl
    main: .
    binary: azrl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/slamb2k/azrl/cmd.Version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
  - id: ghrl
    main: ./cmd/ghrl
    binary: ghrl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/slamb2k/azrl/cmd.Version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: azrl
    ids: [azrl, ghrl]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: slamb2k
    name: azrl

brews:
  - name: azrl
    repository:
      owner: slamb2k
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/slamb2k/azrl"
    description: "Azure Remote Login — manage multiple Azure accounts via isolated, directory-scoped profiles"
    # Don't fail the release if HOMEBREW_TAP_TOKEN isn't configured yet — just
    # skip pushing the formula to the tap. Binaries/packages still publish.
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ else }}false{{ end }}'
    install: |
      bin.install "azrl"
      bin.install "ghrl"
    test: |
      system "#{bin}/azrl", "--version"
      system "#{bin}/ghrl", "--version"

nfpms:
  - id: azrl
    ids: [azrl, ghrl]
    package_name: azrl
    vendor: slamb2k
    homepage: "https://github.com/slamb2k/azrl"
    maintainer: "slamb2k <slamb2k@users.noreply.github.com>"
    description: "Azure Remote Login — manage multiple Azure accounts via isolated, directory-scoped profiles"
    formats:
      - deb
      - rpm
