version: 2

project_name: azrl

before:
  hooks:
    - go mod tidy

builds:
  - id: azrl
    main: .
    binary: azrl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/slamb2k/azrl/cmd.Version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: azrl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: slamb2k
    name: azrl
