name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # recovery: re-run the release for current main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: true

      - name: gofmt
        run: |
          bad=$(gofmt -l .)
          if [ -n "$bad" ]; then
            echo "These files need gofmt:"; echo "$bad"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test -race ./...

  release:
    # Every merge to main releases (mad-skills model); PRs only validate.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Serialize releases; never cancel a live release run. Queued runs each
    # recompute the next version from the tags the prior run pushed.
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write # push the release tag + create the GitHub release
      id-token: write # OIDC identity for sigstore-backed provenance
      attestations: write # persist the build attestations
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      # The bump level comes from the conventional commits since the last tag:
      # breaking or feat → minor while on 0.x (matching this repo's tag
      # history), else patch; post-1.0 the standard semver mapping applies.
      # Idempotent: a re-run on an already-tagged HEAD skips the release.
      - name: Resolve release version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if head_tag=$(git describe --tags --exact-match --match 'v*' 2>/dev/null); then
            echo "HEAD already released as $head_tag — nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo v0.0.0)
          range="$last..HEAD"; [ "$last" = "v0.0.0" ] && range=HEAD
          log=$(git log --format='%s%n%b' "$range")
          bump=patch
          if echo "$log" | grep -qE '^[a-z]+(\([^)]*\))?!:|^BREAKING CHANGE'; then
            bump=major
          elif echo "$log" | grep -qE '^feat(\([^)]*\))?:'; then
            bump=minor
          fi
          IFS=. read -r maj min pat <<< "${last#v}"
          if [ "$maj" -eq 0 ] && [ "$bump" = "major" ]; then
            bump=minor # pre-1.0: breaking changes bump the minor, per tag history
          fi
          case "$bump" in
            major) maj=$((maj + 1)); min=0; pat=0 ;;
            minor) min=$((min + 1)); pat=0 ;;
            patch) pat=$((pat + 1)) ;;
          esac
          next="v$maj.$min.$pat"
          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            echo "computed $next but the tag already exists on another commit" >&2
            exit 1
          fi
          echo "releasing $next ($bump bump from $last)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "$next"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}" "refs/tags/$next"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: steps.version.outputs.skip != 'true'
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        if: steps.version.outputs.skip != 'true'
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with Contents:read/write on slamb2k/homebrew-tap (see README)
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Trusted publishing for binaries: OIDC-signed SLSA provenance covering
      # every artifact GoReleaser checksummed. Verify any download with:
      #   gh attestation verify <file> -R slamb2k/azrl
      - name: Attest build provenance
        if: steps.version.outputs.skip != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
